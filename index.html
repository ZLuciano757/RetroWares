<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RetroVerse - Consolas Retro</title>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  :root {
    --purple: #7c3aed; --amber: #f59e0b;
    --dark: #0f0a1e; --card-bg: #1a1030;
    --text: #f3f0ff; --text-muted: #a78bfa;
    --border: rgba(124,58,237,0.3); --green: #22c55e;
  }
  body { background: var(--dark); color: var(--text); font-family: 'Inter', sans-serif; min-height: 100vh; }
  nav { background: rgba(15,10,30,0.95); border-bottom: 1px solid var(--border); padding: 0 2rem; display: flex; align-items: center; justify-content: space-between; height: 60px; position: sticky; top: 0; z-index: 100; }
  .logo { font-family: 'Press Start 2P', monospace; font-size: 14px; color: var(--amber); }
  .nav-links { display: flex; gap: 1.5rem; align-items: center; }
  .nav-links a { color: var(--text-muted); text-decoration: none; font-size: 14px; cursor: pointer; }
  .nav-links a:hover { color: var(--text); }
  .cart-btn { background: var(--purple); color: white; border: none; padding: 8px 16px; border-radius: 8px; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 6px; font-family: 'Inter', sans-serif; }
  .cart-count { background: var(--amber); color: #000; border-radius: 50%; width: 18px; height: 18px; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 600; }
  .hero { background: #0f0a1e; padding: 4rem 2rem; text-align: center; border-bottom: 1px solid var(--border); position: relative; overflow: hidden; }
  .hero::before { content: ''; position: absolute; top: 0; left: 0; right: 0; bottom: 0; background-image: repeating-linear-gradient(0deg, transparent, transparent 40px, rgba(124,58,237,0.05) 40px, rgba(124,58,237,0.05) 41px), repeating-linear-gradient(90deg, transparent, transparent 40px, rgba(124,58,237,0.05) 40px, rgba(124,58,237,0.05) 41px); pointer-events: none; }
  .hero-tag { display: inline-block; background: rgba(245,158,11,0.15); color: var(--amber); border: 1px solid rgba(245,158,11,0.3); padding: 4px 12px; border-radius: 20px; font-size: 12px; margin-bottom: 1rem; font-family: 'Press Start 2P', monospace; }
  .hero h1 { font-family: 'Press Start 2P', monospace; font-size: clamp(18px, 4vw, 32px); line-height: 1.5; color: white; margin-bottom: 1rem; }
  .hero h1 span { color: var(--amber); }
  .hero p { color: var(--text-muted); font-size: 16px; max-width: 480px; margin: 0 auto 2rem; line-height: 1.6; }
  .hero-btns { display: flex; gap: 1rem; justify-content: center; flex-wrap: wrap; }
  .btn-primary { background: var(--purple); color: white; border: none; padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; }
  .btn-primary:hover { background: #6d28d9; }
  .btn-secondary { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 12px 24px; border-radius: 8px; font-size: 14px; cursor: pointer; font-family: 'Inter', sans-serif; }
  .filters { padding: 1.5rem 2rem; display: flex; gap: 0.75rem; flex-wrap: wrap; border-bottom: 1px solid var(--border); background: rgba(26,16,48,0.5); }
  .filter-btn { background: transparent; color: var(--text-muted); border: 1px solid var(--border); padding: 6px 14px; border-radius: 20px; font-size: 13px; cursor: pointer; font-family: 'Inter', sans-serif; transition: all 0.2s; }
  .filter-btn.active, .filter-btn:hover { background: var(--purple); color: white; border-color: var(--purple); }
  .products-section { padding: 2rem; }
  .section-title { font-size: 20px; font-weight: 600; margin-bottom: 1.5rem; }
  .products-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(240px, 1fr)); gap: 1.25rem; }
  .product-card { background: var(--card-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; transition: border-color 0.2s, transform 0.2s; cursor: pointer; }
  .product-card:hover { border-color: var(--purple); transform: translateY(-2px); }
  .product-img { width: 100%; height: 160px; display: flex; align-items: center; justify-content: center; font-size: 60px; background: rgba(124,58,237,0.08); border-bottom: 1px solid var(--border); }
  .product-info { padding: 1rem; }
  .product-badge { display: inline-block; font-size: 11px; padding: 3px 8px; border-radius: 4px; margin-bottom: 6px; font-weight: 500; }
  .badge-retro { background: rgba(124,58,237,0.2); color: #c4b5fd; }
  .badge-clasico { background: rgba(245,158,11,0.15); color: #fcd34d; }
  .badge-portatil { background: rgba(34,197,94,0.15); color: #86efac; }
  .badge-arcade { background: rgba(239,68,68,0.15); color: #fca5a5; }
  .badge-coleccionable { background: rgba(236,72,153,0.15); color: #f9a8d4; }
  .product-name { font-size: 15px; font-weight: 600; margin-bottom: 4px; }
  .product-year { font-size: 12px; color: var(--text-muted); margin-bottom: 8px; }
  .product-desc { font-size: 13px; color: var(--text-muted); line-height: 1.5; margin-bottom: 12px; }
  .product-footer { display: flex; align-items: center; justify-content: space-between; }
  .product-price { font-size: 18px; font-weight: 600; color: var(--amber); }
  .product-stock { font-size: 11px; color: var(--green); }
  .product-stock.sin-stock { color: #ef4444; }
  .add-cart-btn { background: var(--purple); color: white; border: none; padding: 7px 14px; border-radius: 7px; font-size: 12px; cursor: pointer; font-family: 'Inter', sans-serif; }
  .add-cart-btn:hover { background: #6d28d9; }
  .add-cart-btn:disabled { background: #3b2f5e; color: #6b5fa0; cursor: not-allowed; }
  .modal-overlay { display: none; position: fixed; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8); z-index: 200; align-items: center; justify-content: center; padding: 1rem; }
  .modal-overlay.open { display: flex; }
  .modal { background: var(--card-bg); border: 1px solid var(--border); border-radius: 16px; padding: 2rem; max-width: 480px; width: 100%; max-height: 90vh; overflow-y: auto; position: relative; }
  .modal-close { position: absolute; top: 1rem; right: 1rem; background: transparent; border: none; color: var(--text-muted); font-size: 20px; cursor: pointer; }
  .modal-emoji { font-size: 64px; text-align: center; margin-bottom: 1rem; }
  .modal h2 { font-size: 20px; font-weight: 600; margin-bottom: 4px; }
  .modal-year { color: var(--text-muted); font-size: 13px; margin-bottom: 1rem; }
  .modal-price { font-size: 28px; font-weight: 700; color: var(--amber); margin-bottom: 1.5rem; }
  .modal-fields { display: flex; flex-direction: column; gap: 8px; margin-bottom: 1.5rem; }
  .field-row { display: flex; gap: 8px; font-size: 13px; padding: 8px 0; border-bottom: 1px solid rgba(124,58,237,0.1); }
  .field-label { color: var(--text-muted); min-width: 130px; }
  .field-value { color: var(--text); font-weight: 500; }
  .modal-add-btn { width: 100%; background: var(--purple); color: white; border: none; padding: 12px; border-radius: 8px; font-size: 15px; cursor: pointer; font-family: 'Inter', sans-serif; font-weight: 500; }
  .modal-add-btn:disabled { background: #3b2f5e; color: #6b5fa0; cursor: not-allowed; }
  .cart-panel { display: none; position: fixed; top: 0; right: 0; bottom: 0; width: 320px; background: var(--card-bg); border-left: 1px solid var(--border); z-index: 300; flex-direction: column; padding: 1.5rem; }
  .cart-panel.open { display: flex; }
  .cart-items { flex: 1; overflow-y: auto; display: flex; flex-direction: column; gap: 12px; }
  .cart-item { display: flex; gap: 10px; align-items: center; padding: 10px; background: rgba(124,58,237,0.08); border-radius: 8px; font-size: 13px; }
  .cart-item-emoji { font-size: 28px; }
  .cart-item-info { flex: 1; }
  .cart-item-name { font-weight: 500; }
  .cart-item-qty { font-size: 11px; color: var(--text-muted); margin-top: 2px; }
  .cart-item-right { display: flex; flex-direction: column; align-items: flex-end; gap: 4px; }
  .cart-item-price { color: var(--amber); font-weight: 600; white-space: nowrap; }
  .qty-controls { display: flex; align-items: center; gap: 6px; }
  .qty-btn { background: rgba(124,58,237,0.3); border: none; color: var(--text); width: 22px; height: 22px; border-radius: 4px; cursor: pointer; font-size: 14px; display: flex; align-items: center; justify-content: center; font-family: 'Inter', sans-serif; }
  .qty-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  .qty-num { font-size: 13px; font-weight: 500; min-width: 16px; text-align: center; }
  .remove-btn { background: none; border: none; color: #ef4444; cursor: pointer; font-size: 15px; }
  .cart-total { border-top: 1px solid var(--border); padding-top: 1rem; margin-top: 1rem; }
  .total-row { display: flex; justify-content: space-between; font-size: 16px; font-weight: 600; margin-bottom: 1rem; }
  .checkout-btn { width: 100%; background: var(--amber); color: #000; border: none; padding: 12px; border-radius: 8px; font-size: 15px; font-weight: 600; cursor: pointer; font-family: 'Inter', sans-serif; }
  .close-cart-btn { background: transparent; border: none; color: var(--text-muted); font-size: 22px; cursor: pointer; }
  .empty-cart { color: var(--text-muted); text-align: center; padding: 2rem 0; font-size: 14px; }
  .toast { position: fixed; bottom: 2rem; left: 50%; transform: translateX(-50%) translateY(80px); padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; z-index: 500; transition: transform 0.3s; pointer-events: none; }
  .toast.show { transform: translateX(-50%) translateY(0); }
  .toast.ok { background: #22c55e; color: white; }
  .toast.err { background: #ef4444; color: white; }
  footer { background: rgba(26,16,48,0.8); border-top: 1px solid var(--border); padding: 2rem; text-align: center; color: var(--text-muted); font-size: 13px; }
  .footer-logo { font-family: 'Press Start 2P', monospace; font-size: 12px; color: var(--amber); margin-bottom: 0.5rem; }
</style>
</head>
<body>

<nav>
  <div class="logo">RetroVerse</div>
  <div class="nav-links">
    <a>Consolas</a><a>Accesorios</a><a>Juegos</a><a>Nosotros</a>
  </div>
  <button class="cart-btn" onclick="toggleCart()">
    🛒 Carrito <span class="cart-count" id="cartCount">0</span>
  </button>
</nav>

<section class="hero">
  <div class="hero-tag">★ NIVEL MÁXIMO EN NOSTALGIA ★</div>
  <h1>Tu tienda de<br><span>consolas retro</span></h1>
  <p>Encontrá las consolas que marcaron tu infancia. Calidad garantizada, historia incluida.</p>
  <div class="hero-btns">
    <button class="btn-primary" onclick="document.querySelector('.products-section').scrollIntoView({behavior:'smooth'})">Ver catálogo</button>
    <button class="btn-secondary">¿Cómo compramos?</button>
  </div>
</section>

<div class="filters">
  <button class="filter-btn active" onclick="filterProducts('todos', this)">Todos</button>
  <button class="filter-btn" onclick="filterProducts('retro', this)">Retro</button>
  <button class="filter-btn" onclick="filterProducts('clasico', this)">Clásico</button>
  <button class="filter-btn" onclick="filterProducts('portatil', this)">Portátil</button>
  <button class="filter-btn" onclick="filterProducts('arcade', this)">Arcade</button>
  <button class="filter-btn" onclick="filterProducts('coleccionable', this)">Coleccionable</button>
</div>

<section class="products-section">
  <p class="section-title">Catálogo de consolas</p>
  <div class="products-grid" id="productsGrid"></div>
</section>

<footer>
  <div class="footer-logo">RetroVerse</div>
  <p>© 2026 RetroVerse — Todos los derechos reservados</p>
</footer>

<div class="modal-overlay" id="modal" onclick="closeModal(event)">
  <div class="modal">
    <button class="modal-close" onclick="closeModalDirect()">✕</button>
    <div class="modal-emoji" id="mEmoji"></div>
    <h2 id="mName"></h2>
    <div class="modal-year" id="mYear"></div>
    <div class="modal-price" id="mPrice"></div>
    <div class="modal-fields" id="mFields"></div>
    <button class="modal-add-btn" id="mAddBtn"></button>
  </div>
</div>

<div class="cart-panel" id="cartPanel">
  <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:1.5rem">
    <h3 style="margin:0;font-size:17px;font-weight:600">Carrito</h3>
    <button class="close-cart-btn" onclick="toggleCart()">✕</button>
  </div>
  <div class="cart-items" id="cartItems"></div>
  <div class="cart-total">
    <div class="total-row"><span>Total</span><span id="cartTotal">$0</span></div>
    <button class="checkout-btn" onclick="checkout()">Finalizar compra</button>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const products = [
  { id:"CON-001", nombre:"Nintendo Entertainment System", anio:1983, categoria:"clasico", emoji:"🎮", fabricante:"Nintendo", procesador:"Ricoh 2A03 (1.79 MHz)", ram:"2 KB", resolucion:"256×240 px", estado:"Excelente", incluye:"1 control, cables AV, 2 juegos", precio:18500, stock:4, descripcion:"La NES que lo inició todo. Super Mario Bros, Zelda y Contra en una sola caja gris." },
  { id:"CON-002", nombre:"Sega Mega Drive", anio:1988, categoria:"retro", emoji:"🕹️", fabricante:"Sega", procesador:"Motorola 68000 (7.67 MHz)", ram:"64 KB", resolucion:"320×224 px", estado:"Muy bueno", incluye:"2 controles de 6 botones, cable de video", precio:22000, stock:2, descripcion:"El rival eterno de Nintendo. Sonic, Streets of Rage y Mortal Kombat en su mejor versión." },
  { id:"CON-003", nombre:"Game Boy Color", anio:1998, categoria:"portatil", emoji:"👾", fabricante:"Nintendo", procesador:"Z80 mejorado (8 MHz)", ram:"32 KB", resolucion:"160×144 px", estado:"Bueno", incluye:"Con tapa protectora original", precio:9800, stock:7, descripcion:"Pokémon Oro y Plata, Tetris DX y Link's Awakening DX en la palma de tu mano." },
  { id:"CON-004", nombre:"Atari 2600", anio:1977, categoria:"retro", emoji:"📺", fabricante:"Atari Inc.", procesador:"MOS 6507 (1.19 MHz)", ram:"128 bytes", resolucion:"160×192 px", estado:"Bueno", incluye:"1 joystick, 3 cartuchos clásicos", precio:14500, stock:3, descripcion:"La pionera del gaming doméstico. Pitfall, Space Invaders y Pac-Man en la sala de tu casa." },
  { id:"CON-005", nombre:"Arcade Cocktail Cabinet", anio:1982, categoria:"arcade", emoji:"🕹️", fabricante:"Múltiples", procesador:"Varios chips Z80", ram:"Múltiple", resolucion:"256×224 px", estado:"Restaurado", incluye:"1000 juegos preinstalados, 2 joysticks", precio:85000, stock:1, descripcion:"Mesa arcade de época completamente restaurada. Galaga, Donkey Kong y Pac-Man como en el salón." },
  { id:"CON-006", nombre:"Super Nintendo (SNES)", anio:1990, categoria:"clasico", emoji:"🎯", fabricante:"Nintendo", procesador:"Ricoh 5A22 (3.58 MHz)", ram:"128 KB", resolucion:"256×224 px", estado:"Excelente", incluye:"2 controles, Super Mario World, fuente", precio:25000, stock:5, descripcion:"El pico dorado del 16 bits. Donkey Kong Country, Street Fighter II y Zelda: A Link to the Past." },
  { id:"CON-007", nombre:"PlayStation 1", anio:1994, categoria:"clasico", emoji:"💿", fabricante:"Sony", procesador:"MIPS R3000A (33 MHz)", ram:"2 MB", resolucion:"320×240 px", estado:"Muy bueno", incluye:"2 controles DualShock, memory card", precio:19900, stock:6, descripcion:"La primera PlayStation que cambió el gaming para siempre. Final Fantasy VII, Crash y Metal Gear Solid." },
  { id:"CON-008", nombre:"Sega Game Gear", anio:1990, categoria:"portatil", emoji:"🔋", fabricante:"Sega", procesador:"Z80 (3.58 MHz)", ram:"8 KB", resolucion:"160×144 px", estado:"Bueno", incluye:"Adaptador AC, funda de transporte", precio:11200, stock:3, descripcion:"La portátil a color que desafiaba la Game Boy. Pantalla retroiluminada y biblioteca de más de 300 juegos." },
  { id:"CON-009", nombre:"Nintendo GameCube", anio:2001, categoria:"clasico", emoji:"🟣", fabricante:"Nintendo", procesador:"IBM PowerPC Gekko (485 MHz)", ram:"24 MB", resolucion:"480p (Progressive Scan)", estado:"Muy bueno", incluye:"1 control violeta, cable AV, memoria de 59 bloques", precio:32000, stock:4, descripcion:"El cubo morado más querido del gaming. Super Smash Bros Melee, Mario Kart Double Dash y Zelda Wind Waker." },
  { id:"CON-010", nombre:"Nintendo 64", anio:1996, categoria:"clasico", emoji:"🎌", fabricante:"Nintendo", procesador:"NEC VR4300 (93.75 MHz)", ram:"4 MB (expansible a 8 MB)", resolucion:"240p / 480i", estado:"Excelente", incluye:"1 control con rumble pak, Super Mario 64", precio:28500, stock:3, descripcion:"La revolución del 3D. Mario 64, Ocarina of Time y GoldenEye definieron una generación entera." },
  { id:"CON-011", nombre:"Game Boy", anio:1989, categoria:"portatil", emoji:"🟩", fabricante:"Nintendo", procesador:"Sharp LR35902 (4.19 MHz)", ram:"8 KB", resolucion:"160×144 px (escala de grises)", estado:"Bueno", incluye:"Tetris, funda de tela original", precio:7500, stock:5, descripcion:"La abuela de todas las portátiles. Tetris, Pokémon Rojo y Azul y Link's Awakening en pantalla verde." },
  { id:"CON-012", nombre:"Game Boy Advance", anio:2001, categoria:"portatil", emoji:"🔵", fabricante:"Nintendo", procesador:"ARM7TDMI (16.78 MHz)", ram:"32 KB", resolucion:"240×160 px", estado:"Muy bueno", incluye:"Cable link, 2 juegos, funda", precio:12000, stock:4, descripcion:"16 bits en el bolsillo. Pokémon Rubí y Zafiro, Metroid Fusion y los remakes de SNES brillaron aquí." },
  { id:"CON-013", nombre:"Game Boy Advance SP", anio:2003, categoria:"portatil", emoji:"🌟", fabricante:"Nintendo", procesador:"ARM7TDMI (16.78 MHz)", ram:"32 KB", resolucion:"240×160 px", estado:"Excelente", incluye:"Cargador original, 1 juego", precio:14500, stock:3, descripcion:"La evolución plegable del GBA con pantalla retroiluminada. El diseño clamshell que todos querían tener." },
  { id:"CON-014", nombre:"Sega Master System", anio:1986, categoria:"retro", emoji:"⬛", fabricante:"Sega", procesador:"Z80A (3.58 MHz)", ram:"8 KB", resolucion:"256×192 px", estado:"Bueno", incluye:"Control tipo pistola, 2 cartuchos", precio:13000, stock:2, descripcion:"La respuesta de Sega a la NES. Alex Kidd, Sonic y Wonder Boy en una máquina robusta y confiable." },
  { id:"CON-015", nombre:"Sega Saturn", anio:1994, categoria:"coleccionable", emoji:"🪐", fabricante:"Sega", procesador:"2× Hitachi SH-2 (28.6 MHz c/u)", ram:"2 MB", resolucion:"320×240 px", estado:"Muy bueno", incluye:"2 controles, 1 juego japonés, memory card", precio:45000, stock:2, descripcion:"La joya incomprendida de Sega. Panzer Dragoon Saga, Radiant Silvergun y Nights son piezas de museo." },
  { id:"CON-016", nombre:"Sega Dreamcast", anio:1998, categoria:"coleccionable", emoji:"🌀", fabricante:"Sega", procesador:"Hitachi SH-4 (200 MHz)", ram:"16 MB", resolucion:"640×480 px", estado:"Excelente", incluye:"2 controles con VMU, cable VGA, 3 juegos", precio:52000, stock:1, descripcion:"La última consola de Sega y adelantada a su tiempo. Shenmue, Jet Set Radio y Soul Calibur siguen sin envejecer." },
  { id:"CON-017", nombre:"PlayStation 2", anio:2000, categoria:"clasico", emoji:"💽", fabricante:"Sony", procesador:"Emotion Engine (294 MHz)", ram:"32 MB", resolucion:"480i / 480p / 1080i", estado:"Muy bueno", incluye:"2 controles DualShock 2, memory card 8 MB", precio:24000, stock:5, descripcion:"La consola más vendida de la historia. GTA San Andreas, Shadow of the Colossus y God of War en su mejor versión." },
  { id:"CON-018", nombre:"Xbox Original", anio:2001, categoria:"clasico", emoji:"🟢", fabricante:"Microsoft", procesador:"Intel Pentium III (733 MHz)", ram:"64 MB", resolucion:"480p / 720p / 1080i", estado:"Bueno", incluye:"2 controles Duke, cable AV, Halo Combat Evolved", precio:21000, stock:3, descripcion:"El debut de Microsoft en el gaming. Halo definió los shooters de consola y el Xbox Live cambió el juego online." },
  { id:"CON-019", nombre:"Neo Geo AES", anio:1990, categoria:"coleccionable", emoji:"👑", fabricante:"SNK", procesador:"Motorola 68000 (12 MHz)", ram:"64 KB", resolucion:"320×224 px", estado:"Excelente", incluye:"2 joysticks arcade originales, 1 cartucho", precio:120000, stock:1, descripcion:"La consola arcade para el hogar más poderosa de su época. King of Fighters, Metal Slug y Samurai Shodown son leyenda." },
  { id:"CON-020", nombre:"Neo Geo Pocket Color", anio:1999, categoria:"portatil", emoji:"🎴", fabricante:"SNK", procesador:"Toshiba TLCS900H (6.144 MHz)", ram:"64 KB", resolucion:"160×152 px", estado:"Muy bueno", incluye:"Funda rígida, cable link, 2 juegos SNK", precio:38000, stock:2, descripcion:"La portátil rival de la GBA con el mejor joystick táctil de la historia. King of Fighters R2 y Sonic Pocket Adventure." },
];

let cart = {};

function stockDisponible(id) {
  const p = products.find(x => x.id === id);
  return p.stock - (cart[id] || 0);
}

function totalEnCarrito() {
  return Object.values(cart).reduce((s, q) => s + q, 0);
}

function getActiveFilter() {
  const btn = document.querySelector('.filter-btn.active');
  if (!btn) return 'todos';
  const t = btn.textContent.toLowerCase().normalize("NFD").replace(/[\u0300-\u036f]/g,"");
  const map = { clasico:'clasico', retro:'retro', portatil:'portatil', arcade:'arcade', coleccionable:'coleccionable' };
  return map[t] || 'todos';
}

function renderProducts(filter) {
  const grid = document.getElementById('productsGrid');
  const filtered = filter === 'todos' ? products : products.filter(p => p.categoria === filter);
  grid.innerHTML = filtered.map(p => {
    const restante = stockDisponible(p.id);
    const sinStock = restante <= 0;
    return `
    <div class="product-card" onclick="openModal('${p.id}')">
      <div class="product-img">${p.emoji}</div>
      <div class="product-info">
        <span class="product-badge badge-${p.categoria}">${p.categoria.charAt(0).toUpperCase()+p.categoria.slice(1)}</span>
        <div class="product-name">${p.nombre}</div>
        <div class="product-year">${p.fabricante} · ${p.anio}</div>
        <div class="product-desc">${p.descripcion}</div>
        <div class="product-footer">
          <div>
            <div class="product-price">$${p.precio.toLocaleString('es-AR')}</div>
            <div class="product-stock ${sinStock?'sin-stock':''}">${sinStock ? '✕ Sin stock' : '✓ '+restante+' disponibles'}</div>
          </div>
          <button class="add-cart-btn" ${sinStock?'disabled':''} onclick="event.stopPropagation();addToCart('${p.id}')">
            ${sinStock ? 'Agotado' : '+ Agregar'}
          </button>
        </div>
      </div>
    </div>`;
  }).join('');
}

function filterProducts(cat, btn) {
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderProducts(cat);
}

function openModal(id) {
  const p = products.find(x => x.id === id);
  const restante = stockDisponible(id);
  const sinStock = restante <= 0;
  document.getElementById('mEmoji').textContent = p.emoji;
  document.getElementById('mName').textContent = p.nombre;
  document.getElementById('mYear').textContent = `${p.fabricante} · Lanzamiento: ${p.anio}`;
  document.getElementById('mPrice').textContent = `$${p.precio.toLocaleString('es-AR')}`;
  document.getElementById('mFields').innerHTML = [
    ['Fabricante (clave 1°)', p.fabricante],
    ['Categoría (clave 2°)', p.categoria],
    ['Procesador', p.procesador],
    ['RAM', p.ram],
    ['Resolución', p.resolucion],
    ['Estado', p.estado],
    ['Incluye', p.incluye],
    ['Stock disponible', sinStock ? '✕ Sin stock' : `${restante} unidades`],
  ].map(([k,v]) => `<div class="field-row"><span class="field-label">${k}</span><span class="field-value">${v}</span></div>`).join('');
  const btn = document.getElementById('mAddBtn');
  btn.textContent = sinStock ? 'Sin stock disponible' : 'Agregar al carrito';
  btn.disabled = sinStock;
  btn.onclick = () => { addToCart(id); closeModalDirect(); };
  document.getElementById('modal').classList.add('open');
}

function closeModal(e) { if (e.target === document.getElementById('modal')) closeModalDirect(); }
function closeModalDirect() { document.getElementById('modal').classList.remove('open'); }

function addToCart(id) {
  if (stockDisponible(id) <= 0) { showToast('No hay más stock disponible', 'err'); return; }
  cart[id] = (cart[id] || 0) + 1;
  updateCart();
  const p = products.find(x => x.id === id);
  showToast(`${p.nombre} agregado ✓`, 'ok');
  renderProducts(getActiveFilter());
}

function changeQty(id, delta) {
  const p = products.find(x => x.id === id);
  const next = (cart[id] || 0) + delta;
  if (next <= 0) { delete cart[id]; }
  else if (next > p.stock) { showToast('No hay más stock disponible', 'err'); return; }
  else { cart[id] = next; }
  updateCart();
  renderProducts(getActiveFilter());
}

function updateCart() {
  document.getElementById('cartCount').textContent = totalEnCarrito();
  const ids = Object.keys(cart).filter(id => cart[id] > 0);
  const items = document.getElementById('cartItems');
  if (!ids.length) {
    items.innerHTML = '<p class="empty-cart">Tu carrito está vacío</p>';
    document.getElementById('cartTotal').textContent = '$0';
    return;
  }
  items.innerHTML = ids.map(id => {
    const p = products.find(x => x.id === id);
    const qty = cart[id];
    return `
    <div class="cart-item">
      <span class="cart-item-emoji">${p.emoji}</span>
      <div class="cart-item-info">
        <div class="cart-item-name">${p.nombre}</div>
        <div class="cart-item-qty">$${p.precio.toLocaleString('es-AR')} c/u</div>
      </div>
      <div class="cart-item-right">
        <span class="cart-item-price">$${(p.precio*qty).toLocaleString('es-AR')}</span>
        <div class="qty-controls">
          <button class="qty-btn" onclick="changeQty('${id}',-1)">−</button>
          <span class="qty-num">${qty}</span>
          <button class="qty-btn" onclick="changeQty('${id}',1)" ${qty>=p.stock?'disabled':''}>+</button>
        </div>
      </div>
    </div>`;
  }).join('');
  document.getElementById('cartTotal').textContent = `$${ids.reduce((s,id)=>s+products.find(x=>x.id===id).precio*cart[id],0).toLocaleString('es-AR')}`;
}

function toggleCart() { document.getElementById('cartPanel').classList.toggle('open'); }

function checkout() {
  if (!totalEnCarrito()) { showToast('Agregá productos primero', 'err'); return; }
  cart = {}; updateCart(); toggleCart();
  renderProducts(getActiveFilter());
  showToast('¡Compra realizada! Gracias por tu pedido 🎮', 'ok');
}

function showToast(msg, type) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.className = `toast ${type} show`;
  setTimeout(() => t.classList.remove('show'), 2500);
}

renderProducts('todos');
updateCart();
</script>
</body>
</html>
